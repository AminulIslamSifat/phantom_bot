<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Class Schedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --text-light: #94a3b8;
            --lab-bg: #f4f8fa;
            --badge-bg: #fee2e2;
            --badge-text: #ef4444;
            --hover-bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .schedule-container {
            width: 100%;
            max-width: 1400px;
            background: var(--bg-surface);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03), 0 1px 3px rgba(0,0,0,0.02);
            overflow: hidden; /* Clips the table corners perfectly */
            border: 1px solid var(--border-color);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            white-space: nowrap;
        }

        th, td {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            vertical-align: middle;
            transition: background 0.2s ease;
        }

        th:last-child, td:last-child {
            border-right: none;
        }
        
        tr:last-child td {
            border-bottom: none;
        }

        /* Hover effect for rows, excluding headers */
        tbody tr:hover td {
            background-color: var(--hover-bg);
        }
        tbody tr:hover td.lab-slot {
            background-color: #edf4f8;
        }

        /* Headers */
        thead {
            background-color: var(--bg-surface);
        }

        .period-row th {
            font-weight: 600;
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding-bottom: 8px;
            padding-top: 24px;
        }

        .time-row th {
            font-weight: 400;
            font-size: 12px;
            color: var(--text-light);
            padding-top: 0;
            padding-bottom: 24px;
        }

        sup {
            font-size: 0.7em;
        }

        /* Day Column */
        .day-cell {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-main);
            text-align: left;
            padding-left: 32px !important;
            background: var(--bg-surface);
        }

        /* Course Typography */
        .course {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .teacher {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Minimal empty state */
        .empty-slot {
            color: var(--border-color);
            font-weight: 400;
        }

        /* Lab Background */
        .lab-slot {
            background-color: var(--lab-bg);
        }

        /* Modern Pill Badges for Roll numbers */
        .roll-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 10px;
            background-color: var(--badge-bg);
            color: var(--badge-text);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>

<div id="schedule-container" class="schedule-container">
    <!-- JS will render the table here -->
</div>

<script>
    // Fallback data in case the browser blocks fetch() due to local CORS policy
    const fallbackData = {
        "periods": ["1st", "2nd", "3rd", "4th", "5th", "6th", "Break", "7th", "8th", "9th"],
        "times": ["8:00-8:50", "8:50-9:40", "9:40-10:30", "10:50-11:40", "11:40-12:30", "12:30-1:20", "1:20-2:30", "2:30-", "---", "-4:00"],
        "routine": [
            { "day": "Saturday", "slots": [{ "course": null }, { "course": null }, { "course": null }, { "course": null }, { "course": "CSE 2101", "teacher": "FAR - 102" }, { "course": "HUM 2113", "teacher": "TKS - 102" }, { "course": null }, { "course": "CSE 2104", "teacher": "MZI - HW Lab", "roll": "1-30", "colspan": 3, "isLab": true }] },
            { "day": "Sunday", "slots": [{ "course": null }, { "course": "HUM 2113", "teacher": "NFI - 103" }, { "course": "EEE 2151", "teacher": "MMI/MNA - 103" }, { "course": null }, { "course": null }, { "course": null }, { "course": null }, { "course": "EEE 2152", "teacher": "TSJ - Machine Lab(West)", "roll": "1-30", "colspan": 3, "isLab": true }] },
            { "day": "Monday", "slots": [{ "course": null }, { "course": null }, { "course": null }, { "course": "HUM 2113", "teacher": "TKS - 103" }, { "course": "MATH 2113", "teacher": "AH - 103" }, { "course": "EEE 2151", "teacher": "MMI/MNA - 103" }, { "course": null }, { "course": "CSE 2102", "teacher": "FAR - NW Lab", "roll": "31-60", "colspan": 3, "isLab": true }] },
            { "day": "Tuesday", "slots": [{ "course": null }, { "course": "CSE 2103", "teacher": "BA/MZI - 101" }, { "course": "MATH 2113", "teacher": "AH - 101" }, { "course": "EEE 2151", "teacher": "MMI/MNA - 101" }, { "course": "CSE 2101", "teacher": "FAR - 101" }, { "course": null }, { "course": null }, { "course": null }, { "course": null }, { "course": null }] },
            { "day": "Wednesday", "slots": [{ "course": null }, { "course": "CSE 2103", "teacher": "BA/MZI - 101" }, { "course": "CSE 2103", "teacher": "BA/MZI - 101" }, { "course": "CSE 2101", "teacher": "FAR - 101" }, { "course": "MATH 2113", "teacher": "MSR - 101" }, { "course": null }, { "course": null }, { "course": "CSE 2104/CSE 2102", "teacher": "BA/FAR - HW Lab/PG Lab", "roll": "31-60, 1-30", "colspan": 3, "isLab": true }] }
        ]
    };

    // Format periods (e.g., "1st" -> "1<sup>st</sup>")
    function formatSuperscript(text) {
        return text.replace(/(\d+)(st|nd|rd|th)/, '$1<sup>$2</sup>');
    }

    async function loadRoutine() {
        let data;
        try {
            // Attempt to fetch from JSON file
            const response = await fetch('routine.json');
            if (!response.ok) throw new Error('Network response was not ok');
            data = await response.json();
            console.log("Loaded data from routine.json");
        } catch (error) {
            // Fallback to internal data if running locally without a web server
            console.warn("Could not load routine.json (likely due to CORS). Using fallback data.");
            data = fallbackData;
        }
        renderTable(data);
    }

    function renderTable(data) {
        const container = document.getElementById('schedule-container');
        
        // 1. Build Headers
        let html = `<table><thead>`;
        
        // Period Row
        html += `<tr class="period-row"><th>Day/Period</th>`;
        data.periods.forEach(p => { html += `<th>${formatSuperscript(p)}</th>`; });
        html += `</tr>`;

        // Time Row
        html += `<tr class="time-row"><th>Time</th>`;
        data.times.forEach(t => { html += `<th>${t}</th>`; });
        html += `</tr></thead><tbody>`;

        // 2. Build Body (Days & Slots)
        data.routine.forEach(dayInfo => {
            html += `<tr><td class="day-cell">${dayInfo.day}</td>`;
            
            dayInfo.slots.forEach(slot => {
                let colspanAttr = slot.colspan ? ` colspan="${slot.colspan}"` : '';
                let classAttr = slot.isLab ? ` class="lab-slot"` : '';
                
                html += `<td${colspanAttr}${classAttr}>`;
                
                if (slot.course) {
                    html += `<div class="course">${slot.course}</div>`;
                    if (slot.teacher) html += `<div class="teacher">${slot.teacher}</div>`;
                    if (slot.roll) html += `<div class="roll-badge">${slot.roll}</div>`;
                } else {
                    html += `<span class="empty-slot">-</span>`;
                }
                
                html += `</td>`;
            });
            html += `</tr>`;
        });

        html += `</tbody></table>`;
        container.innerHTML = html;
    }

    // Initialize fetching on page load
    window.onload = loadRoutine;
</script>

</body>
</html>
